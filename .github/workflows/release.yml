name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  # ─── Job 1: Fast-fail validation ────────────────────────────────────────────
  # Checks both version consistency and CHANGELOG before any builds start.
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate tag matches Cargo.toml version
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          TAG_VERSION=${GITHUB_REF_NAME#v}
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: Tag $GITHUB_REF_NAME does not match Cargo.toml version $CARGO_VERSION"
            exit 1
          fi
          echo "Version validated: $CARGO_VERSION"

      - name: Validate CHANGELOG entry exists and is non-empty
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          VERSION_ESC=${VERSION//./\\.}
          NOTES=$(awk "/^## \[$VERSION_ESC\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md \
            | sed '/^[[:space:]]*$/d')
          if [ -z "$NOTES" ]; then
            echo "ERROR: No CHANGELOG entry found for version $VERSION"
            echo "Add a '## [$VERSION]' section with content to CHANGELOG.md before tagging."
            exit 1
          fi
          echo "CHANGELOG entry found for $VERSION"

  # ─── Job 2: macOS build ─────────────────────────────────────────────────────
  build-macos:
    name: Build (macOS)
    needs: validate
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Tailwind CSS CLI
        run: brew install tailwindcss

      - name: Generate main.css
        run: tailwindcss -i assets/tailwind.css -o assets/main.css

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@v1.17.7

      - name: Install Dioxus CLI
        run: cargo binstall dioxus-cli@0.7.3 --no-confirm --force || cargo install dioxus-cli@0.7.3 --locked

      - name: Build release bundle
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 20
          max_attempts: 3
          command: dx bundle --release --verbose

      - name: Locate, rename, and checksum artifact
        run: |
          DMG=$(find ./target/dx -name "*.dmg" | head -1)
          if [ -z "$DMG" ]; then
            echo "ERROR: No .dmg artifact found after dx bundle. Searching for any bundles:"
            find ./target/dx \( -name "*.dmg" -o -name "*.app" \) | head -20 || true
            exit 1
          fi
          VERSION=${GITHUB_REF_NAME#v}
          ARTIFACT="brewvault-v${VERSION}-macos.dmg"
          cp "$DMG" "$ARTIFACT"
          openssl dgst -sha256 -r "$ARTIFACT" > "${ARTIFACT}.sha256"
          echo "ARTIFACT=$ARTIFACT" >> "$GITHUB_ENV"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-artifacts
          path: |
            ${{ env.ARTIFACT }}
            ${{ env.ARTIFACT }}.sha256

  # ─── Job 3: Linux build ─────────────────────────────────────────────────────
  # Uses `dx build` (not `dx bundle`) to avoid the broken AppImage bundler.
  # dx bundle on Linux (AppImage via linuxdeploy) is broken in dioxus-cli 0.7.x:
  #   https://github.com/DioxusLabs/dioxus/issues/3426
  # Additionally, strip=true in Cargo.toml causes dx to lose assets entirely:
  #   https://github.com/DioxusLabs/dioxus/issues/4874
  # We override strip via CARGO_PROFILE_RELEASE_STRIP=none and ship a tarball instead.
  build-linux:
    name: Build (Linux)
    needs: validate
    runs-on: ubuntu-latest
    env:
      CARGO_PROFILE_RELEASE_STRIP: none
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libglib2.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev

      - name: Install Tailwind CSS CLI
        run: |
          curl -sLO https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-linux-x64
          chmod +x tailwindcss-linux-x64
          sudo mv tailwindcss-linux-x64 /usr/local/bin/tailwindcss

      - name: Generate main.css
        run: tailwindcss -i assets/tailwind.css -o assets/main.css

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@v1.17.7

      - name: Install Dioxus CLI
        run: cargo binstall dioxus-cli@0.7.3 --no-confirm --force || cargo install dioxus-cli@0.7.3 --locked

      - name: Build release
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 20
          max_attempts: 3
          command: dx build --release

      - name: Package artifact as tarball
        run: |
          APP_DIR=$(find ./target/dx -maxdepth 5 -type d -name "app" | grep -E "release/linux" | head -1)
          if [ -z "$APP_DIR" ]; then
            echo "ERROR: No app directory found after dx build. Available paths:"
            find ./target/dx -type d | head -30 || true
            exit 1
          fi
          VERSION=${GITHUB_REF_NAME#v}
          ARTIFACT="brewvault-v${VERSION}-linux.tar.gz"
          tar -czf "$ARTIFACT" -C "$(dirname "$APP_DIR")" app
          openssl dgst -sha256 -r "$ARTIFACT" > "${ARTIFACT}.sha256"
          echo "ARTIFACT=$ARTIFACT" >> "$GITHUB_ENV"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-artifacts
          path: |
            ${{ env.ARTIFACT }}
            ${{ env.ARTIFACT }}.sha256

  # ─── Job 4: Windows build ───────────────────────────────────────────────────
  build-windows:
    name: Build (Windows)
    needs: validate
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6

      - name: Install OpenSSL (MSVC-compatible via vcpkg)
        shell: pwsh
        run: |
          vcpkg install openssl:x64-windows-static
          echo "OPENSSL_DIR=C:/vcpkg/installed/x64-windows-static" >> $env:GITHUB_ENV
          echo "OPENSSL_STATIC=1" >> $env:GITHUB_ENV

      - name: Install Tailwind CSS CLI
        run: |
          curl -sLO https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-windows-x64.exe
          chmod +x tailwindcss-windows-x64.exe
          mv tailwindcss-windows-x64.exe tailwindcss.exe
          echo "$PWD" >> "$GITHUB_PATH"

      - name: Generate main.css
        run: tailwindcss -i assets/tailwind.css -o assets/main.css

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-binstall
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf \
            "https://github.com/cargo-bins/cargo-binstall/releases/latest/download/cargo-binstall-x86_64-pc-windows-msvc.zip" \
            -o binstall.zip
          unzip binstall.zip cargo-binstall.exe
          mv cargo-binstall.exe ~/.cargo/bin/

      - name: Install Dioxus CLI
        run: cargo binstall dioxus-cli@0.7.3 --no-confirm --force

      - name: Build release bundle
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 20
          max_attempts: 3
          shell: bash
          command: dx bundle --release --verbose

      - name: Locate, rename, and checksum artifact
        run: |
          MSI=$(find ./target/dx -name "*.msi" | head -1)
          if [ -z "$MSI" ]; then
            echo "ERROR: No .msi artifact found after dx bundle. Searching for bundles:"
            find . \( -name "*.msi" -o -name "*.exe" -path "*/bundle/*" \) | head -20 || true
            exit 1
          fi
          VERSION=${GITHUB_REF_NAME#v}
          ARTIFACT="brewvault-v${VERSION}-windows.msi"
          cp "$MSI" "$ARTIFACT"
          openssl dgst -sha256 -r "$ARTIFACT" > "${ARTIFACT}.sha256"
          echo "ARTIFACT=$ARTIFACT" >> "$GITHUB_ENV"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-artifacts
          path: |
            ${{ env.ARTIFACT }}
            ${{ env.ARTIFACT }}.sha256

  # ─── Job 5: Create GitHub Release ───────────────────────────────────────────
  release:
    name: Release
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: artifacts/

      - name: Extract CHANGELOG notes
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          VERSION_ESC=${VERSION//./\\.}
          NOTES=$(awk "/^## \[$VERSION_ESC\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md \
            | sed '/^[[:space:]]*$/d')
          {
            echo "RELEASE_NOTES<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Detect pre-release
        run: |
          if [[ "${GITHUB_REF_NAME}" == *"-"* ]]; then
            echo "IS_PRERELEASE=true" >> "$GITHUB_ENV"
          else
            echo "IS_PRERELEASE=false" >> "$GITHUB_ENV"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: BrewVault ${{ github.ref_name }}
          body: ${{ env.RELEASE_NOTES }}
          prerelease: ${{ env.IS_PRERELEASE }}
          files: artifacts/**

[package]
name = "brew-vault"
version = "0.1.0"
edition = "2024"

[dependencies]
dioxus = { version = "0.7", features = ["desktop", "router", "signals"] }
totp-rs = { version = "5", features = ["gen_secret", "serde_support"] }
keyring = { version = "3", features = ["apple-native"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4"] }
chrono = "0.4.44"

[profile.release]
opt-level = "z"
strip = true
lto = true
